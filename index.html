<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralHook AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}

h1 {
  font-size: 22px;
  background: linear-gradient(90deg,#ff0050,#00f2ea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

textarea {
  width: 100%;
  height: 80px;
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
}

select {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: #1a1a1a;
  color: white;
  border: none;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#ff0050,#00f2ea);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}

.copy-btn {
  margin-top: 10px;
  background: #333;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 ViralHook AI</h1>
<p>Enter idea → get viral title + hashtags ⚡</p>

<textarea id="idea" placeholder="e.g cheese noodles"></textarea>

<select id="tone">
  <option value="viral">🔥 Viral</option>
  <option value="funny">😂 Funny</option>
  <option value="luxury">💎 Luxury</option>
</select>

<button onclick="generate()">⚡ Generate</button>

<div class="result" id="output"></div>

<button class="copy-btn" onclick="copyText()">📋 Copy All</button>

</div>

<script>
let lastResult = "";

async function generate() {
  let idea = document.getElementById("idea").value;
  let tone = document.getElementById("tone").value;

  if (!idea) {
    alert("Idea likho pehle!");
    return;
  }

  document.getElementById("output").innerText = "Generating... ⏳";

  try {
    let res = await fetch("/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ idea, tone })
    });

    let data = await res.json();

    // 🔥 SAFE FIX (undefined avoid)
    if (!data.result) {
      document.getElementById("output").innerText =
        "Error aa raha hai backend se ❌";
      return;
    }

    lastResult = data.result;
    document.getElementById("output").innerText = lastResult;

  } catch (err) {
    document.getElementById("output").innerText =
      "Server error ❌";
  }
}

function copyText() {
  if (!lastResult) {
    alert("Kuch generate karo pehle!");
    return;
  }

  navigator.clipboard.writeText(lastResult);
  alert("Copied!");
}
</script>

</body>
</html>
