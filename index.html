<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralHook AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.container {
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 30px rgba(255,0,80,0.2);
  text-align: center;
}

/* Title */
h1 {
  font-size: 22px;
  background: linear-gradient(90deg,#ff0050,#00f2ea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Input */
textarea {
  width: 100%;
  height: 80px;
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #1a1a1a;
  color: white;
  font-size: 14px;
}

/* Button */
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#ff0050,#00f2ea);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* Output */
.result {
  margin-top: 20px;
  text-align: left;
}

.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

/* Copy button */
.copy {
  float: right;
  cursor: pointer;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 ViralHook AI</h1>
<p>Enter video idea — get viral titles + hashtags ⚡</p>

<textarea id="idea" placeholder="e.g cooking egg, gym tips..."></textarea>

<button onclick="generate()">⚡ Generate</button>

<div class="result" id="output"></div>

</div>

<script>
async function generate() {
  let idea = document.getElementById("idea").value;

  if(!idea){
    alert("Idea likho pehle!");
    return;
  }

  document.getElementById("output").innerHTML = "Generating... ⏳";

  let res = await fetch("/api/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ idea })
  });

  let data = await res.json();

  let text = data.result.split("\n");

  let html = "";

  text.forEach(line => {
    if(line.trim() !== ""){
      html += `<div class="card">
        <span class="copy" onclick="copyText(this)">Copy</span>
        ${line}
      </div>`;
    }
  });

  document.getElementById("output").innerHTML = html;
}

function copyText(el){
  let text = el.parentElement.innerText.replace("Copy","");
  navigator.clipboard.writeText(text);
  el.innerText = "Copied!";
}
</script>

</body>
</html>
