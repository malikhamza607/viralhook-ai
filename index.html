<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro TikTok Viral Generator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #fff; display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h2 { font-weight: 800; font-size: 24px; margin-bottom: 5px; background: -webkit-linear-gradient(#00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 13px; color: #b3b3b3; margin-bottom: 25px; }

        input {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: rgba(0, 0, 0, 0.2); color: #fff; font-size: 16px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); outline: none;
            transition: 0.3s;
        }
        input:focus { box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 0 10px rgba(0, 242, 254, 0.5); }
        input::placeholder { color: #888; }

        button.generate-btn {
            width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, #ff0050, #00f2fe);
            color: white; font-size: 16px; font-weight: 600; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 0, 80, 0.4); transition: 0.3s transform;
        }
        button.generate-btn:active { transform: scale(0.95); }

        .loader { display: none; margin-top: 20px; font-size: 14px; color: #00f2fe; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .result-container {
            display: none; margin-top: 25px; background: rgba(0, 0, 0, 0.3);
            border-radius: 15px; padding: 20px; text-align: left; position: relative;
            border-left: 4px solid #ff0050;
        }

        .result-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; line-height: 1.4;}
        .result-tags { font-size: 14px; color: #00f2fe; }

        .copy-btn {
            width: 100%; margin-top: 15px; padding: 12px; border: 1px solid #00f2fe;
            background: transparent; color: #00f2fe; border-radius: 10px;
            font-weight: 600; cursor: pointer; transition: 0.3s;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .copy-btn:hover { background: rgba(0, 242, 254, 0.1); }
        
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #4facfe; color: #fff; padding: 10px 20px; border-radius: 50px;
            font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .toast.show { opacity: 1; bottom: 40px; }

    </style>
</head>
<body>

<div class="glass-card">
    <h2>🚀 Viral Engine</h2>
    <p>1 Title, 5 Hashtags. API ki zaroorat nahi!</p>
    
    <input type="text" id="videoTitle" placeholder="Apna topic yahan likhein...">
    <button class="generate-btn" onclick="generateViral()">Magic Kardo! ✨</button>
    
    <div class="loader" id="loader">Data find kar raha hoon... 🔍</div>
    
    <div class="result-container" id="resultBox">
        <div class="result-title" id="outTitle"></div>
        <div class="result-tags" id="outTags"></div>
        <button class="copy-btn" onclick="copyToClipboard()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy Text
        </button>
    </div>
</div>

<div class="toast" id="toast">Copied to clipboard! ✅</div>

<script>
    let finalCopyText = "";

    async function generateViral() {
        const titleInput = document.getElementById("videoTitle").value.trim();
        if (!titleInput) { alert("Pehle koi topic likhein!"); return; }

        document.getElementById("loader").style.display = "block";
        document.getElementById("resultBox").style.display = "none";

        try {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleInput })
            });
            const data = await response.json();
            
            document.getElementById("outTitle").innerText = data.title;
            document.getElementById("outTags").innerText = data.hashtags;
            
            // Copy karne ke liye text ready karna
            finalCopyText = `${data.title}\n\n${data.hashtags}`;
            
            document.getElementById("resultBox").style.display = "block";
        } catch (error) {
            alert("Kuch masla ho gaya. Internet check karein.");
        } finally {
            document.getElementById("loader").style.display = "none";
        }
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(finalCopyText).then(() => {
            const toast = document.getElementById("toast");
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2000);
        });
    }
</script>

</body>
</html>
