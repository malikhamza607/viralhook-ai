<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViralHook AI</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  width: 90%;
  max-width: 400px;
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}
textarea, select {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #1a1a1a;
  color: white;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg,#ff0050,#00f2ea);
  color: white;
  font-weight: bold;
}
.result {
  margin-top: 20px;
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  white-space: pre-line;
}
</style>
</head>

<body>

<div class="container">
<h2>🔥 ViralHook AI</h2>

<textarea id="idea" placeholder="e.g cheese noodles"></textarea>

<select id="tone">
  <option value="viral">🔥 Viral</option>
  <option value="funny">😂 Funny</option>
  <option value="luxury">💎 Luxury</option>
</select>

<button onclick="generate()">⚡ Generate</button>

<div class="result" id="output"></div>

<button onclick="copyText()">📋 Copy All</button>
</div>

<script>
let lastResult = "";

async function generate() {
  let idea = document.getElementById("idea").value;
  let tone = document.getElementById("tone").value;

  if (!idea) {
    alert("Idea likho!");
    return;
  }

  document.getElementById("output").innerText = "Generating...";

  try {
    let res = await fetch(window.location.origin + "/api/generate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ idea, tone })
    });

    let data = await res.json();

    if (!data.result) {
      document.getElementById("output").innerText = "Error aa gaya ❌";
      return;
    }

    lastResult = data.result;
    document.getElementById("output").innerText = lastResult;

  } catch (e) {
    document.getElementById("output").innerText = "Server error ❌";
  }
}

function copyText() {
  if (!lastResult) return alert("Pehle generate karo");
  navigator.clipboard.writeText(lastResult);
  alert("Copied!");
}
</script>

</body>
</html>
